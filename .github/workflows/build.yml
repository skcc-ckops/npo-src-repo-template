name: build-and-push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    uses: skccmygit/npo-platform-ci-templates/.github/workflows/docker-build-push.yml@main
    with:
      image_name: 'my-app' # TODO: (필수) 개발할 애플리케이션의 이름을 작성하세요 (예: my-app)
      harbor_project: 'npo' # (고정) 이미지 배포할 Harbor 프로젝트 이름
      config_repo: 'skccmygit/npo-platform-deploy' # (고정) 모든 앱이 공유하는 중앙 배포 레포지토리 주소
