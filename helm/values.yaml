# [USER CONFIGURATION] 애플리케이션 개별 환경 설정 값
# 의존성(npo-platform-chart) 키워드 하위에 값을 선언해야 플랫폼 기본값을 안전하게 덮어쓸 수 있습니다.

npo-platform-chart:
  replicaCount: 1 # TODO: (선택) 레플리카 수 변경이 필요하다면 수정 (기본값: 1)

  image:
    repository: harbor.biz-think.net/npo/my-app # TODO: (필수) 본인의 앱 이름으로 경로 변경 (예: harbor.biz-think.net/npo/my-app)
    pullPolicy: Always
    tag: "latest" # 절대 수정 금지! (소스 푸시 시 봇이 알아서 교체해 줍니다)

  ingress:
    hosts:
      - host: ct-api-workportal.cloudz.co.kr
        paths:
          - path: /my-app # TODO: (필수) 접속 라우팅 경로 지정 (예: /my-app)
            pathType: Prefix

  env: # TODO: (선택) 앱 구동에 필요한 환경변수가 있다면 추가
    - name: EXAMPLE_ENV_VAR
      value: "hello"

  resources: # TODO: (선택) Pod의 CPU/메모리 할당량 조절 필요 시 변경
    limits:
      cpu: 500m
      memory: 512Mi
